<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - متجر MODE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- الهيدر -->
    <header>
        <div class="logo">
            <i class="fas fa-tshirt"></i>
            <span>MODE</span>
        </div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="products.html" class="active">المنتجات</a>
            <a href="cart.html">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </a>
        </nav>
    </header>

    <!-- التصفية -->
    <section class="products-page">
        <div class="filters">
            <select id="category-filter" onchange="filterProducts()">
                <option value="all">كل التصنيفات</option>
                <option value="men">رجالي</option>
                <option value="women">حريمي</option>
                <option value="kids">أطفال</option>
            </select>
            
            <select id="price-filter" onchange="filterProducts()">
                <option value="all">كل الأسعار</option>
                <option value="0-100">أقل من 100 ريال</option>
                <option value="100-200">100 - 200 ريال</option>
                <option value="200+">أكثر من 200 ريال</option>
            </select>
        </div>
        
        <!-- كل المنتجات -->
        <div class="products-grid" id="all-products"></div>
    </section>

    <!-- الفوتر -->
    <footer>
        <p>© 2024 متجر MODE - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // تحميل صفحة المنتجات
        document.getElementById('all-products').innerHTML = generateProductsHTML(products);
    </script>
</body>
</html>

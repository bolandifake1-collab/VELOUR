<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر MODE - ملابس عصرية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- الهيدر -->
    <header>
        <div class="logo">
            <i class="fas fa-tshirt"></i>
            <span>MODE</span>
        </div>
        <nav>
            <a href="index.html" class="active">الرئيسية</a>
            <a href="products.html">المنتجات</a>
            <a href="cart.html">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </a>
        </nav>
    </header>

    <!-- القسم الرئيسي -->
    <section class="hero">
        <h1>أحدث صيحات الموضة</h1>
        <p>تسوق الآن واحصل على خصم 20% على أول طلب</p>
        <a href="products.html" class="btn">تسوق الآن</a>
    </section>

    <!-- التصنيفات -->
    <section class="categories">
        <h2>التصنيفات</h2>
        <div class="category-grid">
            <div class="category-card">
                <i class="fas fa-male"></i>
                <h3>رجالي</h3>
            </div>
            <div class="category-card">
                <i class="fas fa-female"></i>
                <h3>حريمي</h3>
            </div>
            <div class="category-card">
                <i class="fas fa-child"></i>
                <h3>أطفال</h3>
            </div>
        </div>
    </section>

    <!-- المنتجات -->
    <section class="featured">
        <h2>أفضل العروض</h2>
        <div class="products-grid" id="featured-products">
            <!-- المنتجات تضاف هنا -->
        </div>
    </section>

    <!-- الفوتر -->
    <footer>
        <p>© 2024 متجر MODE - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
